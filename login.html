<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인/회원가입 - 블록웹스튜디오</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: 'Pretendard', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased select-none min-h-screen flex flex-col justify-center items-center p-6">

    <a href="index.html" class="font-extrabold text-2xl tracking-tight text-slate-900 flex items-center gap-2 mb-10 hover:opacity-80 transition">
        <div class="w-6 h-6 bg-indigo-600 rounded-md"></div>
        blockwebstudio
    </a>

    <div class="bg-white p-8 md:p-10 rounded-3xl shadow-xl border border-slate-200 w-full max-w-[420px] overflow-hidden">
        
        <div id="authSection">
            <div class="flex border-b border-slate-100 mb-8">
                <button id="loginTab" class="flex-1 pb-4 text-sm font-bold border-b-2 border-indigo-600 text-slate-900 transition">로그인</button>
                <button id="signupTab" class="flex-1 pb-4 text-sm font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-600 transition">회원가입</button>
            </div>

            <h2 id="formTitle" class="text-2xl font-bold text-slate-900 mb-2">환영합니다!</h2>
            <p id="formDesc" class="text-slate-500 text-sm mb-8">블록웹스튜디오 계정으로 시작하세요.</p>

            <form id="authForm" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5 ml-1">이메일 주소</label>
                    <input type="email" id="authEmail" placeholder="example@blockwebstudio.com" required
                           class="w-full px-4 py-3.5 rounded-xl border border-slate-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 outline-none transition">
                </div>

                <div>
                    <div class="flex justify-between items-center mb-1.5 ml-1">
                        <label class="text-xs font-bold text-slate-700 uppercase tracking-wider">비밀번호 (8자 이상)</label>
                        <a href="#" id="forgotPw" class="text-[11px] text-indigo-600 font-bold hover:underline">비밀번호 찾기</a>
                    </div>
                    <input type="password" id="authPw" placeholder="••••••••" required minlength="8"
                           class="w-full px-4 py-3.5 rounded-xl border border-slate-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 outline-none transition">
                </div>

                <div id="pwConfirmWrapper" class="hidden">
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5 ml-1">비밀번호 재확인</label>
                    <input type="password" id="authPwConfirm" placeholder="••••••••"
                           class="w-full px-4 py-3.5 rounded-xl border border-slate-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 outline-none transition">
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 transition shadow-lg mt-2 disabled:bg-slate-300">
                    로그인하기
                </button>
            </form>
        </div>

        <div id="verifySection" class="hidden text-center py-4">
            <div class="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.53 4.389a2 2 0 001.94 0L20 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
            </div>
            <h2 id="verifyTitle" class="text-2xl font-bold text-slate-900 mb-2">인증 메일을 보냈습니다</h2>
            <p class="text-slate-500 text-sm mb-8"><span id="targetEmail" class="font-bold text-slate-800"></span>(으)로 발송된 6자리 코드를 입력해주세요.</p>
            
            <div class="flex justify-between gap-2 mb-8">
                <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-2xl font-bold border-2 border-slate-200 rounded-xl focus:border-indigo-500 outline-none transition">
                <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-2xl font-bold border-2 border-slate-200 rounded-xl focus:border-indigo-500 outline-none transition">
                <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-2xl font-bold border-2 border-slate-200 rounded-xl focus:border-indigo-500 outline-none transition">
                <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-2xl font-bold border-2 border-slate-200 rounded-xl focus:border-indigo-500 outline-none transition">
                <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-2xl font-bold border-2 border-slate-200 rounded-xl focus:border-indigo-500 outline-none transition">
                <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-2xl font-bold border-2 border-slate-200 rounded-xl focus:border-indigo-500 outline-none transition">
            </div>

            <button id="verifyBtn" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-slate-800 transition shadow-lg mb-4">인증 완료</button>
            <button onclick="location.reload()" class="text-sm text-slate-400 font-medium hover:text-slate-600">이메일 다시 입력하기</button>
        </div>

    </div>

    <script>
        const loginTab = document.getElementById('loginTab');
        const signupTab = document.getElementById('signupTab');
        const authSection = document.getElementById('authSection');
        const verifySection = document.getElementById('verifySection');
        const submitBtn = document.getElementById('submitBtn');
        const authEmail = document.getElementById('authEmail');
        const authPw = document.getElementById('authPw');
        const authPwConfirm = document.getElementById('authPwConfirm');
        const pwConfirmWrapper = document.getElementById('pwConfirmWrapper');
        const targetEmail = document.getElementById('targetEmail');
        const authForm = document.getElementById('authForm');
        const otpInputs = document.querySelectorAll('.otp-input');
        const forgotPw = document.getElementById('forgotPw');

        let mode = 'login'; 
        const WORKER_URL = 'https://blockwebstudio-auth.jush0509.workers.dev';

        // 탭 전환: 회원가입
        signupTab.onclick = () => {
            mode = 'signup';
            pwConfirmWrapper.classList.remove('hidden');
            authPwConfirm.required = true;
            loginTab.classList.replace('border-indigo-600', 'border-transparent');
            loginTab.classList.replace('text-slate-900', 'text-slate-400');
            signupTab.classList.replace('border-transparent', 'border-indigo-600');
            signupTab.classList.replace('text-slate-400', 'text-slate-900');
            submitBtn.innerText = "가입하기";
        };

        // 탭 전환: 로그인
        loginTab.onclick = () => {
            mode = 'login';
            pwConfirmWrapper.classList.add('hidden');
            authPwConfirm.required = false;
            signupTab.classList.replace('border-indigo-600', 'border-transparent');
            signupTab.classList.replace('text-slate-900', 'text-slate-400');
            loginTab.classList.replace('border-transparent', 'border-indigo-600');
            loginTab.classList.replace('text-slate-400', 'text-slate-900');
            submitBtn.innerText = "로그인하기";
        };

        // 비밀번호 찾기 클릭
        forgotPw.onclick = (e) => {
            e.preventDefault();
            mode = 'forgot';
            alert("가입하신 이메일을 입력하고 [인증 코드 발송]을 눌러주세요.");
            submitBtn.innerText = "인증 코드 발송";
            pwConfirmWrapper.classList.add('hidden');
        };

        // 폼 제출 (로그인 또는 인증번호 발송 요청)
        authForm.onsubmit = async (e) => {
            e.preventDefault();
            
            if (authPw.value.length < 8) {
                alert("비밀번호는 최소 8자리 이상이어야 합니다.");
                return;
            }

            if (mode === 'signup' && authPw.value !== authPwConfirm.value) {
                alert("비밀번호 재확인이 일치하지 않습니다.");
                return;
            }

            // [Case A] 회원가입 또는 비밀번호 찾기 (인증번호 발송)
            if(mode === 'signup' || mode === 'forgot') {
                submitBtn.innerText = "발송 중...";
                submitBtn.disabled = true;

                try {
                    const response = await fetch(WORKER_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            action: "send_otp",
                            email: authEmail.value 
                        })
                    });

                    const data = await response.json();

                    if(data.success) {
                        targetEmail.innerText = authEmail.value;
                        if(mode === 'forgot') document.getElementById('verifyTitle').innerText = "비밀번호 재설정 인증";
                        authSection.classList.add('hidden');
                        verifySection.classList.remove('hidden');
                        otpInputs[0].focus();
                    } else {
                        alert("요청 실패: " + (data.error || "다시 시도해주세요."));
                    }
                } catch (err) {
                    alert("서버 통신 오류가 발생했습니다.");
                } finally {
                    submitBtn.innerText = mode === 'signup' ? "가입하기" : "인증 코드 발송";
                    submitBtn.disabled = false;
                }
            } 
            // [Case B] 로그인 시도 (수정된 로직)
            else {
                submitBtn.innerText = "로그인 중...";
                submitBtn.disabled = true;
                try {
                    const response = await fetch(WORKER_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            action: "login",
                            email: authEmail.value,
                            password: authPw.value
                        })
                    });
                    const data = await response.json();
                    if(data.success) {
                        // 세션 정보 저장
                        localStorage.setItem('bs_auth_token', data.token);
                        localStorage.setItem('bs_user_email', data.email);
                        
                        alert("로그인에 성공했습니다!");
                        // 히스토리를 남기지 않고 메인으로 이동
                        window.location.replace("index.html"); 
                    } else {
                        alert(data.error || "로그인 정보를 확인해주세요.");
                    }
                } catch (err) {
                    alert("서버 연결 실패");
                } finally {
                    submitBtn.innerText = "로그인하기";
                    submitBtn.disabled = false;
                }
            }
        };

        // OTP 입력 포커스 이동
        otpInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    otpInputs[index - 1].focus();
                }
            });
        });

        // [Step 2] 인증 완료 버튼 (OTP 검증 및 계정 생성/변경)
        document.getElementById('verifyBtn').onclick = async () => {
            const code = Array.from(otpInputs).map(i => i.value).join('');
            if(code.length < 6) {
                alert("6자리 번호를 모두 입력해주세요.");
                return;
            }

            try {
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: "verify_otp",
                        email: authEmail.value,
                        password: authPw.value,
                        otp: code
                    })
                });
                const data = await response.json();

                if(data.success) {
                    alert(mode === 'forgot' ? "비밀번호가 성공적으로 변경되었습니다!" : "회원가입이 완료되었습니다! 로그인해 주세요.");
                    location.reload(); 
                } else {
                    alert(data.error || "인증번호가 일치하지 않습니다.");
                }
            } catch (err) {
                alert("인증 처리 중 오류가 발생했습니다.");
            }
        };
    </script>
</body>
</html>
